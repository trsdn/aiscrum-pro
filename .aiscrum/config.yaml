project:
  name: ai-scrum-autonomous-v2
  base_branch: main
copilot:
  executable: copilot
  max_parallel_sessions: 42
  session_timeout_ms: 300000
  auto_approve_tools: true
  allow_tool_patterns: []
  mcp_servers:
    - type: stdio
      name: github
      command: npx
      args:
        - -y
        - "@github/mcp-server"
  instructions: []
  phases:
    planner:
      model: claude-sonnet-4.5
      mcp_servers: []
      instructions: []
    worker:
      model: claude-sonnet-4.5
      mcp_servers: []
      instructions: []
    reviewer:
      model: claude-sonnet-4.5
      mcp_servers: []
      instructions: []
sprint:
  prefix: Sprint
  min_issues: 0
  max_issues: 3
  max_issues_created_per_sprint: 10
  max_sprints: 0
  max_drift_incidents: 2
  max_retries: 1
  enable_challenger: false
  enable_tdd: false
  auto_revert_drift: false
  backlog_labels:
    - test-run
quality_gates:
  require_tests: true
  require_lint: true
  require_types: true
  require_build: true
  max_diff_lines: 1000
  test_command:
    - npm
    - run
    - test
  lint_command:
    - npm
    - run
    - lint
  typecheck_command:
    - npm
    - run
    - typecheck
  build_command:
    - npm
    - run
    - build
  require_challenger: false
escalation:
  notifications:
    ntfy: true
    ntfy_topic: "${NTFY_TOPIC}"
    ntfy_server_url: https://ntfy.sh
git:
  worktree_base: ../sprint-worktrees
  branch_pattern: "{prefix}/{sprint}/issue-{issue}"
  auto_merge: true
  squash_merge: true
  delete_branch_after_merge: true
github: {}
