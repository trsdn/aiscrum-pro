<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" width="340" height="100" role="img" aria-labelledby="logo-title">
  <title id="logo-title">AiScrum Pro Logo</title>
  <defs>
    <linearGradient id="board-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5" />
      <stop offset="100%" style="stop-color:#7C3AED" />
    </linearGradient>
  </defs>

  <!-- Icon: Kanban lanes with upward momentum -->
  <g transform="translate(50, 50)">
    <!-- Rounded square backdrop -->
    <rect x="-30" y="-30" width="60" height="60" rx="12" fill="url(#board-grad)"/>

    <!-- Three kanban columns as bars, ascending = sprint progress -->
    <rect x="-19" y="6" width="8" height="14" rx="2" fill="#C7D2FE"/>
    <rect x="-4" y="-2" width="8" height="22" rx="2" fill="#A5B4FC"/>
    <rect x="11" y="-12" width="8" height="32" rx="2" fill="#FFFFFF"/>

    <!-- Small upward arrow above tallest bar -->
    <polygon points="15,-15 12,-20 18,-20" fill="#E0E7FF"/>
  </g>

  <!-- Wordmark -->
  <text x="92" y="62" font-family="'Inter','Segoe UI',system-ui,-apple-system,sans-serif" font-size="38" font-weight="700" fill="#E0E7FF" letter-spacing="-1">Ai<tspan fill="#4F46E5">Scrum</tspan><tspan dx="4" font-weight="300" fill="#7C3AED">Pro</tspan></text>
</svg>
